services:
  postgres:
    image: postgres:16-alpine
    container_name: storybook-db
    environment:
      POSTGRES_USER: storybook
      POSTGRES_PASSWORD: storybook
      POSTGRES_DB: storybook
    ports:
      - "5480:5432"  # Use port 5480 externally to avoid conflicts
    volumes:
      - storybook_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storybook -d storybook"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  storybook_postgres_data:
